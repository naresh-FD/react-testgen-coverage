name: Train On Vertex AI

on:
  push:
    branches:
      - main
    paths:
      - "training/**"
      - "data/processed/**"
      - ".github/workflows/train-vertex.yml"
  workflow_dispatch:
    inputs:
      training_file:
        description: "Local repo path or gs:// URI for the JSONL training set"
        required: false
        default: "data/processed/training.jsonl"
      merge_model:
        description: "Merge LoRA weights into a full model after training"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: vertex-train-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit-training-job:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      VERTEX_TRAINING_BUCKET: ${{ vars.VERTEX_TRAINING_BUCKET }}
      VERTEX_MACHINE_TYPE: ${{ vars.VERTEX_MACHINE_TYPE || 'n1-standard-8' }}
      VERTEX_ACCELERATOR_TYPE: ${{ vars.VERTEX_ACCELERATOR_TYPE || 'NVIDIA_TESLA_T4' }}
      VERTEX_ACCELERATOR_COUNT: ${{ vars.VERTEX_ACCELERATOR_COUNT || '1' }}
      VERTEX_EXECUTOR_IMAGE: ${{ vars.VERTEX_EXECUTOR_IMAGE || 'us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-4.py310:latest' }}
      DEFAULT_TRAINING_FILE: data/processed/training.jsonl
      DEFAULT_MODEL_NAME: deepseek-ai/deepseek-coder-1.3b-instruct
    steps:
      - uses: actions/checkout@v4

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in GCP_PROJECT_ID GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT VERTEX_TRAINING_BUCKET; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub repository variables: %s\n' "${missing[*]}"
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Submit Vertex AI custom job
        shell: bash
        run: |
          set -euo pipefail

          training_file="${{ github.event.inputs.training_file || env.DEFAULT_TRAINING_FILE }}"
          merge_model="${{ github.event.inputs.merge_model }}"
          if [ -z "${merge_model}" ]; then
            merge_model="true"
          fi

          mapfile -t requirement_lines < <(grep -vE '^\s*(#|$)' training/requirements-gpu.txt)
          IFS=';'
          requirements="${requirement_lines[*]}"
          unset IFS

          timestamp="$(date -u +%Y%m%d-%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          display_name="react-testgen-${short_sha}-${timestamp}"
          output_uri="${VERTEX_TRAINING_BUCKET%/}/runs/${display_name}"

          job_args=(
            "--training-file=${training_file}"
            "--model-name=${DEFAULT_MODEL_NAME}"
            "--output-dir=/tmp/react-testgen-lora"
            "--merged-dir=/tmp/react-testgen-merged"
            "--gcs-output-uri=${output_uri}"
          )

          if [ "${merge_model}" = "true" ]; then
            job_args+=("--merge-model")
          fi

          IFS=,
          args_csv="${job_args[*]}"
          unset IFS

          gcloud ai custom-jobs create \
            --region="${GCP_REGION}" \
            --display-name="${display_name}" \
            --worker-pool-spec="machine-type=${VERTEX_MACHINE_TYPE},replica-count=1,accelerator-type=${VERTEX_ACCELERATOR_TYPE},accelerator-count=${VERTEX_ACCELERATOR_COUNT},executor-image-uri=${VERTEX_EXECUTOR_IMAGE},local-package-path=.,script=training/vertex_train.py,extra-dirs=data,requirements=${requirements}" \
            --args="${args_csv}"

          printf 'Submitted Vertex AI job: %s\n' "${display_name}"
          printf 'Model artifacts will be uploaded to: %s\n' "${output_uri}"
